proxy_http_version          1.1;
proxy_ignore_client_abort   off;
proxy_read_timeout          86400s;
proxy_redirect              default;
# Rewrite absolute backend redirects (e.g. http://192.168.1.x:port/login) to relative paths (/login) so nginx keeps them under the ingress prefix
proxy_redirect              http:// $scheme://$host/;
proxy_send_timeout          86400s;
proxy_max_temp_file_size    0;

proxy_set_header Accept-Encoding "";
proxy_set_header Connection $connection_upgrade;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-NginX-Proxy true;
# Strip forwarded prefix — prevents backend from redirecting to auth pages
# based on ingress path (e.g. /api/hassio_ingress/.../login.html → 404)
proxy_set_header X-Forwarded-Prefix "";

proxy_ssl_server_name on;
proxy_ssl_session_reuse off;
